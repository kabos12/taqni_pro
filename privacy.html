<h1>سياسة الخصوصية</h1>

<p>
نحن نحترم خصوصية زوار موقع تقني برو.
</p>

<p>
قد يحتوي الموقع على روابط تسويقية (Affiliate Links) إلى متاجر خارجية مثل AliExpress وAmazon.
</p>

<p>
قد نحصل على عمولة عند الشراء من خلال هذه الروابط دون أي تكلفة إضافية على المستخدم.
</p>

<p>
باستخدامك للموقع فإنك توافق على سياسة الخصوصية هذه.
</p>
